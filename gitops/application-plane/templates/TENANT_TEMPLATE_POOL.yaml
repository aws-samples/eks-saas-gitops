apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: {TENANT_ID}
  namespace: flux-system
spec:
  releaseName: {TENANT_ID}-pool
  targetNamespace: pool-1
  storageNamespace: pool-1
  interval: 1m0s
  chart:
    spec:
      chart: helm-tenant-chart
      version: {MAJOR_VERSION}.0.x
      sourceRef:
        kind: HelmRepository
        name: helm-tenant-chart
  values:
    tenantId: {TENANT_ID}
    deployApps: false
    deployIngress: true
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: {TENANT_ID}
  namespace: flux-system
spec:
  path: ./terraform/modules/tenant-apps
  interval: 1m
  approvePlan: auto
  sourceRef:
    kind: GitRepository
    name: terraform
  vars:
    - name: tenant_id
      value: {TENANT_ID}
    - name: enable_producer
      value: false
    - name: enable_consumer
      value: false
    - name: enable_payments
      value: false
